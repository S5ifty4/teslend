<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer black rounded square frame -->
  <rect x="6" y="6" width="88" height="88" rx="14" fill="#111111"/>

  <!-- Hitch receiver ear tabs — left -->
  <rect x="0" y="36" width="10" height="28" rx="4" fill="#111111"/>

  <!-- Hitch receiver ear tabs — right -->
  <rect x="90" y="36" width="10" height="28" rx="4" fill="#111111"/>

  <!-- Inner white background -->
  <rect x="13" y="13" width="74" height="74" rx="8" fill="#FFFFFF"/>

  <!-- Red crossbar (top of inner, = T horizontal stroke) -->
  <rect x="13" y="18" width="74" height="16" rx="3" fill="#E31937"/>

  <!-- T vertical stem (black) -->
  <rect x="25" y="18" width="16" height="62" rx="2" fill="#111111"/>

  <!-- L vertical stroke (black) -->
  <rect x="54" y="18" width="14" height="62" rx="2" fill="#111111"/>

  <!-- L base horizontal stroke (black) -->
  <rect x="54" y="68" width="28" height="12" rx="2" fill="#111111"/>
</svg>
